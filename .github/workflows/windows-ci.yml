name: Windows CI

on:
  push:
    branches: [main, "agent/**"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install development dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: JavaScript syntax
        run: npm run test:syntax

      - name: PowerShell and backend regression tests
        shell: powershell -NoProfile -ExecutionPolicy Bypass -File {0}
        run: .\tests\run-tests.ps1

      - name: Stabilization and failure-injection tests
        shell: powershell -NoProfile -ExecutionPolicy Bypass -File {0}
        run: .\tests\stabilization-tests.ps1

      - name: Repository-state and cache parity tests
        shell: powershell -NoProfile -ExecutionPolicy Bypass -File {0}
        run: .\tests\state-cache-tests.ps1

      - name: Lightweight local-status performance test
        shell: powershell -NoProfile -ExecutionPolicy Bypass -File {0}
        run: .\tests\performance-tests.ps1

      - name: Browser and accessibility tests
        run: npm run test:e2e

      - name: Upload failure diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: branchline-windows-diagnostics
          path: |
            test-results/
            playwright-report/
          if-no-files-found: ignore
          retention-days: 7
